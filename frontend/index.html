<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App — Sign In / Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">📝</span>
        <h1>NoteKeeper</h1>
        <p class="tagline">Your personal note space</p>
      </div>

      <!-- Tab switcher -->
      <div class="tab-bar">
        <button
          class="tab-btn active"
          id="loginTab"
          onclick="switchTab('login')"
        >
          Login
        </button>
        <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">
          Sign Up
        </button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="••••••••"
            required
          />
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">Login</button>
      </form>
      </form>
      <p style="text-align:center; margin-top:10px;">
        Don't have an account?
        <a href="#signup" onclick="switchTab('signup'); return false;">Sign up</a>
      </p>
      <!-- Sign-up form (hidden by default) -->
      <form id="signupForm" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="signupUsername">Username</label>
          <input
            type="text"
            id="signupUsername"
            placeholder="john_doe"
            required
          />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input
            type="email"
            id="signupEmail"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input
            type="password"
            id="signupPassword"
            placeholder="Min. 8 characters"
            required
          />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Repeat password"
            required
          />
        </div>
        <div id="signupError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="signupBtn">
          Create Account
        </button>
      </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
      // On page load, switch tab based on hash
      window.addEventListener('DOMContentLoaded', function() {
        if (window.location.hash === '#signup') {
          switchTab('signup');
        } else {
          switchTab('login');
        }
      });
    </script>
  </body>
</html>
